<!DOCTYPE html>
<html>
<head>

<title>AI Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->

<div class="col-3 sidebar">

<input type="text" id="search" class="form-control mb-2" placeholder="Search..." onkeyup="searchChats()">

<button class="btn btn-primary w-100 mb-2" onclick="newChat()">+ New Chat</button>

<div id="chatList">

{% for convo in conversations %}
<div class="chat-item" data-title="{{convo.title}}">
<span onclick="openChat('{{convo.id}}')">{{convo.title}}</span>
<button onclick="deleteChat('{{convo.id}}')" class="btn btn-sm btn-danger">✕</button>
</div>
{% endfor %}

</div>

<a href="/accounts/logout/" class="btn btn-warning w-100 mt-2">Logout</a>

</div>

<!-- CHAT -->

<div class="col-9 chat-area">

<div id="chat-box" class="chat-box"></div>

<div class="input-area">
<div class="input-group">
<input id="message" class="form-control" placeholder="Type your message...">
<button onclick="sendMessage()" class="btn btn-primary">Send</button>
</div>
</div>

</div>

</div>
</div>

<script>
const csrfToken = "{{ csrf_token }}"
</script>

<script src="{% static 'js/app.js' %}"></script>

</body>
</html>
