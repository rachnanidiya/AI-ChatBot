<!DOCTYPE html>
<html>
<head>

<title>AI Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
font-family:system-ui;
}

/* SIDEBAR */

.sidebar{
background:#020617;
height:100vh;
padding:20px;
border-right:1px solid #1e293b;
}

.chat-item{
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:6px;
transition:0.2s;
}

.chat-item:hover{
background:#1e293b;
transform:translateX(5px);
}

/* CHAT AREA */

.chat-area{
display:flex;
flex-direction:column;
height:100vh;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:40px;
scroll-behavior:smooth;
}

/* WELCOME SCREEN */

.welcome{
text-align:center;
margin-top:120px;
animation:fadeIn 1s ease;
}

.suggestions{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
max-width:600px;
margin:40px auto;
}

.suggestion{
background:#1e293b;
padding:16px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

.suggestion:hover{
background:#334155;
transform:scale(1.03);
}

/* MESSAGE */

.message{
display:flex;
margin-bottom:25px;
animation:fadeIn .3s ease;
}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}

.bubble{
padding:14px 18px;
border-radius:14px;
max-width:60%;
}

.user .bubble{
background:#2563eb;
}

.bot .bubble{
background:#1e293b;
border:1px solid #334155;
}

/* INPUT */

.input-area{
padding:20px;
background:#020617;
border-top:1px solid #1e293b;
}

input{
background:#0f172a !important;
border:1px solid #334155 !important;
color:white !important;
}

/* ANIMATIONS */

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px)}
to{opacity:1}
}

/* TYPING */

.typing{
display:flex;
gap:6px;
padding:10px 14px;
background:#1e293b;
border-radius:10px;
width:60px;
}

.dot{
width:8px;
height:8px;
background:white;
border-radius:50%;
animation:bounce 1.3s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

</style>

</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->

<div class="col-3 sidebar">

<h4>AI Chats</h4>

<button class="btn btn-primary w-100 mb-3" onclick="newChat()">
+ New Chat
</button>

<div id="conversations">

{% for convo in conversations %}

<div class="chat-item" onclick="openChat('{{convo.id}}')">
{{convo.title}}
</div>

{% endfor %}

</div>

</div>


<!-- CHAT AREA -->

<div class="col-9 chat-area">

<div id="chat-box" class="chat-box">

<div class="welcome" id="welcome">

<h1>How can I help today?</h1>

<div class="suggestions">

<div class="suggestion" onclick="useSuggestion(this)">
Explain Artificial Intelligence
</div>

<div class="suggestion" onclick="useSuggestion(this)">
Write Python code for sorting
</div>

<div class="suggestion" onclick="useSuggestion(this)">
Help me study databases
</div>

<div class="suggestion" onclick="useSuggestion(this)">
Give startup ideas
</div>

</div>

</div>

</div>

<div class="input-area">

<div class="input-group">

<input id="message" class="form-control" placeholder="Message AI..." autocomplete="off">

<button onclick="sendMessage()" class="btn btn-primary">
Send
</button>

</div>

</div>

</div>

</div>
</div>

<script>

let currentChat = null


function useSuggestion(el){

document.getElementById("message").value = el.innerText
sendMessage()

}


/* NEW CHAT */

function newChat(){

currentChat = null
document.getElementById("chat-box").innerHTML = `
<div class="welcome">
<h1>New Chat</h1>
</div>
`

}


/* OPEN CHAT */

function openChat(id){

currentChat = id

fetch("/messages/"+id+"/")
.then(res=>res.json())
.then(data=>{

let chatBox = document.getElementById("chat-box")

chatBox.innerHTML=""

data.forEach(msg=>{

let formatted = marked.parse(msg.message)

if(msg.role==="user"){

chatBox.innerHTML += `
<div class="message user">
<div class="bubble">${msg.message}</div>
</div>
`

}else{

chatBox.innerHTML += `
<div class="message bot">
<div class="bubble">${formatted}</div>
</div>
`

}

})

})

}


/* SEND MESSAGE */

async function sendMessage(){

let input = document.getElementById("message")
let message = input.value.trim()

if(message==="") return

let chatBox = document.getElementById("chat-box")

document.getElementById("welcome")?.remove()

chatBox.innerHTML += `
<div class="message user">
<div class="bubble">${message}</div>
</div>
`

chatBox.scrollTop = chatBox.scrollHeight


/* CREATE CHAT ONLY WHEN FIRST MESSAGE */

if(!currentChat){

let res = await fetch("/create/")
let data = await res.json()

currentChat = data.id

}


/* TYPING */

chatBox.innerHTML += `
<div class="message bot" id="typing">
<div class="typing">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</div>
`

chatBox.scrollTop = chatBox.scrollHeight


/* SEND TO DJANGO */

let response = await fetch("/ask/",{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-CSRFToken":"{{ csrf_token }}"
},
body:JSON.stringify({
message:message,
conversation_id:currentChat
})
})

let data = await response.json()

document.getElementById("typing").remove()

let formatted = marked.parse(data.reply)

chatBox.innerHTML += `
<div class="message bot">
<div class="bubble">${formatted}</div>
</div>
`

chatBox.scrollTop = chatBox.scrollHeight

input.value=""

}


/* ENTER KEY */

document.getElementById("message")
.addEventListener("keypress", function(e){

if(e.key==="Enter"){
sendMessage()
}

})

</script>

</body>
</html>
